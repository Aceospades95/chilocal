<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ChiLocal — Chicago, from someone who actually lives here</title>
<style>
  :root{
    --bg:#f3ede1; --surface:#fffdf8; --ink:#211f1b; --muted:#756f63; --line:#e4dccc;
    --accent:#c8102e; --accent-soft:rgba(200,16,46,.10); --gem:#9a6a00; --gem-soft:#f6ead0;
    --plain:#e8e1d2; --plain-stroke:#d6ccb8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
  .serif{font-family:Georgia,"Times New Roman",serif}
  header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--surface)}
  .wordmark{font-family:Georgia,serif;font-size:24px;font-weight:700;letter-spacing:.3px}
  .wordmark .dot{color:var(--accent)}
  header .tag{font-size:13px;color:var(--muted);font-style:italic;border-left:1px solid var(--line);padding-left:16px}
  header .search{margin-left:auto;position:relative}
  header input{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:14px;width:240px;color:var(--ink)}
  header input:focus{outline:none;border-color:var(--accent)}
  .results{position:absolute;top:42px;right:0;left:0;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.12);overflow:hidden;z-index:30}
  .results li{list-style:none;padding:9px 14px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;gap:8px}
  .results li:hover{background:var(--accent-soft)}
  .results .r-sub{color:var(--muted);font-size:12px}
  main{flex:1;display:flex;min-height:0}
  .mapwrap{flex:1.1;position:relative;background:
     radial-gradient(circle at 30% 20%, #f7f2e8, #efe7d8);border-right:1px solid var(--line);min-width:0}
  svg{width:100%;height:100%;display:block}
  path.hood{stroke:var(--plain-stroke);stroke-width:.5;fill:var(--plain);vector-effect:non-scaling-stroke;transition:fill .12s}
  path.hood.curated{fill:var(--accent-soft);stroke:var(--accent);stroke-width:1}
  path.hood.curated:hover{fill:rgba(200,16,46,.22);cursor:pointer}
  path.hood.plain:hover{fill:#ded5c2;cursor:pointer}
  path.hood.active{fill:rgba(200,16,46,.32);stroke:var(--accent);stroke-width:1.6}
  .maptip{position:absolute;pointer-events:none;background:var(--ink);color:#fff;font-size:12px;padding:4px 9px;border-radius:6px;display:none;transform:translate(-50%,-150%);white-space:nowrap}
  .legend{position:absolute;left:16px;bottom:16px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--muted)}
  .legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .legend .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--plain-stroke);background:var(--plain)}
  .legend .sw.cur{background:var(--accent-soft);border-color:var(--accent)}
  .panel{flex:.9;max-width:460px;min-width:340px;overflow-y:auto;background:var(--surface)}
  .pad{padding:22px}
  .intro h1{font-family:Georgia,serif;font-size:26px;margin:.2em 0 .3em;line-height:1.2}
  .intro p{color:var(--muted);line-height:1.6;font-size:15px}
  .hood-cards{margin-top:18px;display:flex;flex-direction:column;gap:10px}
  .hcard{border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;background:var(--bg);transition:border-color .12s,transform .12s}
  .hcard:hover{border-color:var(--accent);transform:translateY(-1px)}
  .hcard h3{margin:0 0 4px;font-size:16px}
  .hcard p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
  .hcard .count{font-size:12px;color:var(--accent);margin-top:8px;font-weight:600}
  .back{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:0;margin-bottom:10px}
  .hood-take{font-family:Georgia,serif;font-size:17px;line-height:1.5;color:#2c2922;margin:6px 0 16px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:var(--bg);color:var(--muted);border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.gem.active{background:var(--gem);border-color:var(--gem)}
  .venue{border-top:1px solid var(--line);padding:16px 0}
  .venue:first-of-type{border-top:none}
  .v-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .v-head h3{margin:0;font-size:17px}
  .v-meta{color:var(--muted);font-size:12px;margin:2px 0 8px}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--gem-soft);color:var(--gem)}
  .take{font-family:Georgia,serif;font-size:15px;line-height:1.55;margin:0 0 10px;color:#2c2922}
  .fit{font-size:13px;display:flex;gap:8px;margin:3px 0;color:#403c34}
  .fit .lab{font-weight:700;min-width:58px}
  .fit.good .lab{color:#2f7d52}.fit.bad .lab{color:#a23b2d}
  .empty{font-family:Georgia,serif;font-size:16px;line-height:1.55;color:var(--muted);margin-top:10px}
  .foot{padding:14px 22px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;background:var(--surface)}
  @media (max-width:820px){ main{flex-direction:column} .panel{max-width:none;min-width:0;max-height:55vh} .mapwrap{min-height:280px} }
</style></head>
<body>
<header>
  <div class="wordmark">Chi<span class="dot">·</span>Local</div>

  <div class="search"><input id="q" placeholder="Find a neighborhood or spot…" autocomplete="off"/><ul class="results" id="results" hidden></ul></div>
</header>
<main>
  <div class="mapwrap">
    <svg id="map" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="maptip" id="tip"></div>
    <div class="legend">
      <div class="row"><span class="sw cur"></span> Curated — we know it</div>
      <div class="row"><span class="sw"></span> Not yet</div>
    </div>
  </div>
  <aside class="panel"><div class="pad" id="panel"></div></aside>
</main>
<div class="foot" id="foot"></div>

pe":"MultiPolygon","coordinates":[[[[-87.71255,41.75734],[-87.72229,41.76147],[-87.72204,41.75337],[-87.7415,41.75329],[-87.74205,41.77113],[-87.73718,41.7712],[-87.73762,41.78578],[-87.7129,41.7861],[-87.71255,41.75734]]]]}},{"type":"Feature","properties":{"id":"west-loop","name":"West Loop","secondary":"WEST LOOP","layer":"neighborhoods","area_sqmi":1.912},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.64447,41.85995],[-87.646,41.88179],[-87.64853,41.88176],[-87.64833,41.87537],[-87.66664,41.87549],[-87.66707,41.88885],[-87.63936,41.88908],[-87.63759,41.88623],[-87.63828,41.88037],[-87.63518,41.87061],[-87.63451,41.85938],[-87.63516,41.85772],[-87.63894,41.85767],[-87.63901,41.86002],[-87.64447,41.85995]]]]}},{"type":"Feature","properties":{"id":"west-pullman","name":"West Pullman","secondary":"WEST PULLMAN","layer":"neighborhoods","area_sqmi":3.583},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.61828,41.65911],[-87.62329,41.6624],[-87.63108,41.65783],[-87.64699,41.65763],[-87.64722,41.66316],[-87.64142,41.66325],[-87.64167,41.67054],[-87.66115,41.67034],[-87.6616,41.68482],[-87.61228,41.68543],[-87.61828,41.65911]]]]}},{"type":"Feature","properties":{"id":"west-ridge","name":"West Ridge","secondary":"WEST RIDGE","layer":"neighborhoods","area_sqmi":3.521},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.68465,42.01948],[-87.68176,42.00865],[-87.67684,41.99796],[-87.67501,41.99799],[-87.67485,41.99076],[-87.68967,41.9905],[-87.68945,41.98317],[-87.7069,41.98308],[-87.71067,41.99729],[-87.70945,41.99739],[-87.70901,42.01913],[-87.68465,42.01948]]]]}},{"type":"Feature","properties":{"id":"west-town","name":"West Town","secondary":"WICKER PARK,WEST TOWN","layer":"neighborhoods","area_sqmi":2.134},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.65686,41.91078],[-87.65923,41.90907],[-87.65749,41.90909],[-87.65829,41.90504],[-87.65589,41.90117],[-87.64489,41.89769],[-87.64407,41.89414],[-87.63936,41.88908],[-87.69157,41.8882],[-87.69177,41.8957],[-87.66729,41.89607],[-87.6678,41.9143],[-87.66102,41.91615],[-87.65808,41.91411],[-87.65686,41.91078]]]]}},{"type":"Feature","properties":{"id":"wicker-park","name":"Wicker Park","secondary":"WICKER PARK,WEST TOWN","layer":"neighborhoods","area_sqmi":0.954},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.6678,41.9143],[-87.6675,41.90335],[-87.69195,41.90297],[-87.6922,41.91395],[-87.6678,41.9143]]]]}},{"type":"Feature","properties":{"id":"woodlawn","name":"Woodlawn","secondary":"WOODLAWN","layer":"neighborhoods","area_sqmi":1.451},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.5863,41.77334],[-87.60577,41.77314],[-87.60559,41.76587],[-87.61545,41.77297],[-87.61576,41.7857],[-87.5866,41.78614],[-87.5863,41.77334]]]]}},{"type":"Feature","properties":{"id":"wrigleyville","name":"Wrigleyville","secondary":"WRIGLEYVILLE","layer":"neighborhoods","area_sqmi":0.261},"geometry":{"type":"MultiPolygon","coordinates":[[[[-87.66422,41.95435],[-87.65454,41.95449],[-87.65424,41.94447],[-87.65652,41.9472],[-87.66402,41.94707],[-87.66422,41.95435]]]]}}]}, DATA={"brand":{"name":"ChiLocal","tagline":"Chicago, from someone who actually lives here."},"neighborhoods":[{"slug":"logan-square","name":"Logan Square","geomKey":"Logan Square","take":"Where Chicago's creative class put down roots and refused to leave. Boulevards, a farmers market that takes itself seriously, and the best run of bars in the city that don't try too hard."},{"slug":"wicker-park","name":"Wicker Park","geomKey":"Wicker Park","take":"Got famous, got expensive, and somehow kept its record stores. Vintage racks, serious cocktails, and people-watching at the six-corners."},{"slug":"pilsen","name":"Pilsen","geomKey":"Lower West Side","take":"Wears its Mexican heritage and its art on the same walls. Murals, the city's best carnitas, and galleries that open late the second Friday of the month."}],"categories":[{"slug":"restaurant","name":"Restaurants"},{"slug":"bar","name":"Bars"},{"slug":"cafe","name":"Coffee & caf\u00e9s"},{"slug":"bookstore","name":"Books"},{"slug":"music","name":"Music"},{"slug":"gallery","name":"Culture"}],"venues":[{"id":"lula-cafe","neighborhood":"logan-square","category":"restaurant","name":"Lula Cafe","price":"$$$","take":"The original neighborhood farm-to-table, doing it since before it was a movement. Go for the Monday Farm Dinner \u2014 the most thoughtful $55 you'll spend all month.","best_for":"Unhurried dinners, vegetable-forward menus","skip_if":"You want fast or formulaic","hidden_gem":false},{"id":"the-whistler","neighborhood":"logan-square","category":"bar","name":"The Whistler","price":"$$","take":"Cocktail bar, live-music room, and art gallery crammed into one storefront with no sign. Get there before nine or you're standing.","best_for":"Cocktails with a soundtrack","skip_if":"You need a table and quiet","hidden_gem":true},{"id":"reno","neighborhood":"logan-square","category":"cafe","name":"Reno","price":"$$","take":"Wood-fired bagels and real coffee by day, a dimmer, different place by night. The morning version is the one to know.","best_for":"Bagels, daytime work sessions","skip_if":"You're in a rush at peak weekend","hidden_gem":false},{"id":"longman-eagle","neighborhood":"logan-square","category":"bar","name":"Longman & Eagle","price":"$$$","take":"A Michelin star and a 400-deep whiskey list pretending to be a roadside inn. Walk-ins only, so come hungry and patient.","best_for":"Whiskey, late brunch","skip_if":"You want a guaranteed reservation","hidden_gem":false},{"id":"big-star","neighborhood":"wicker-park","category":"restaurant","name":"Big Star","price":"$$","take":"Tacos and bourbon on a patio that's been packed for fifteen years. Weeknights are a great time; the weekend wait is a tax.","best_for":"Patio tacos, easy groups","skip_if":"It's Saturday and you're hungry now","hidden_gem":false},{"id":"violet-hour","neighborhood":"wicker-park","category":"bar","name":"The Violet Hour","price":"$$$","take":"An unmarked door and a curtain hide the bar that taught Chicago to take cocktails seriously. Still the standard.","best_for":"A real cocktail, a quiet date","skip_if":"You want loud and fast","hidden_gem":true},{"id":"myopic-books","neighborhood":"wicker-park","category":"bookstore","name":"Myopic Books","price":"$","take":"Three floors of used books that have outlasted every trend on Milwaukee Ave. Open late, which is the whole point.","best_for":"Rainy afternoons, late browsing","skip_if":"You only want new releases","hidden_gem":false},{"id":"doves","neighborhood":"wicker-park","category":"restaurant","name":"Dove's Luncheonette","price":"$$","take":"Tex-Mex at a counter with a soul record always spinning. Sit at the bar, get the chilaquiles, stay for the pie.","best_for":"Solo counter meals, brunch","skip_if":"You need a big table","hidden_gem":false},{"id":"carnitas-uruapan","neighborhood":"pilsen","category":"restaurant","name":"Carnitas Uruapan","price":"$","take":"The carnitas benchmark, sold by the pound since 1975. Cash, styrofoam, no apologies \u2014 get a half pound and the salsa verde.","best_for":"Weekend-morning carnitas runs","skip_if":"You want table service","hidden_gem":false},{"id":"haisous","neighborhood":"pilsen","category":"restaurant","name":"HaiSous","price":"$$$","take":"Vietnamese cooking with real technique and a courtyard worth lingering in. Order the clay-pot dishes and don't skip the C\u00e0 Ph\u00ea \u0110\u00e1 bar next door.","best_for":"A celebratory dinner","skip_if":"You're after cheap and quick","hidden_gem":false},{"id":"thalia-hall","neighborhood":"pilsen","category":"music","name":"Thalia Hall","price":"$$","take":"An 1892 opera house turned the best-sounding mid-size room in the city, with Dusek's downstairs so you never have to leave.","best_for":"Shows you'll remember","skip_if":"You dislike crowds","hidden_gem":false},{"id":"nmma","neighborhood":"pilsen","category":"gallery","name":"National Museum of Mexican Art","price":"Free","take":"One of the country's great Mexican art collections, and admission is free. Most of the city still doesn't know that.","best_for":"An unhurried free afternoon","skip_if":"You only have twenty minutes","hidden_gem":true}],"emptyState":"We haven't spent enough time here to have an opinion worth sharing. ChiLocal only maps the neighborhoods we actually know block by block \u2014 more as we earn them."};
const byKey={}, bySlug={};
DATA.neighborhoods.forEach(n=>{byKey[n.geomKey]=n;bySlug[n.slug]=n;});
const venuesByHood={};
DATA.venues.forEach(v=>{(venuesByHood[v.neighborhood]=venuesByHood[v.neighborhood]||[]).push(v)});
const catName={};DATA.categories.forEach(c=>catName[c.slug]=c.name);
document.getElementById('tagline').textContent=DATA.brand.tagline;
document.getElementById('foot').innerHTML="Boundaries: City of Chicago / Choose Chicago open data. Venue takes are sample editorial content in the ChiLocal voice. Curated for Logan Square, Wicker Park &amp; Pilsen.";

const svg=document.getElementById('map'),tip=document.getElementById('tip');
let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
GEO.features.forEach(f=>f.geometry.coordinates.forEach(p=>p.forEach(r=>r.forEach(c=>{minx=Math.min(minx,c[0]);maxx=Math.max(maxx,c[0]);miny=Math.min(miny,c[1]);maxy=Math.max(maxy,c[1])}))));
const k=Math.cos((miny+maxy)/2*Math.PI/180),W=1000,H=Math.round((maxy-miny)/((maxx-minx)*k)*W);
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
const px=x=>(x-minx)*k/((maxx-minx)*k)*W, py=y=>H-(y-miny)/(maxy-miny)*H;
function dPath(g){let d="";g.coordinates.forEach(poly=>poly.forEach(r=>{r.forEach((c,i)=>d+=(i?"L":"M")+px(c[0]).toFixed(1)+" "+py(c[1]).toFixed(1));d+="Z"}));return d}
let activePath=null;
GEO.features.forEach(f=>{
  const nm=f.properties.name, hood=byKey[nm];
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",dPath(f.geometry));
  p.setAttribute("class","hood "+(hood?"curated":"plain"));
  p.dataset.key=nm;
  p.addEventListener("mousemove",e=>{tip.style.display="block";tip.style.left=e.offsetX+"px";tip.style.top=e.offsetY+"px";tip.textContent=hood?hood.name:nm});
  p.addEventListener("mouseleave",()=>tip.style.display="none");
  p.addEventListener("click",()=>{ if(hood) selectHood(hood.slug,p); else showEmpty(nm,p); });
  svg.appendChild(p);
});
function setActive(p){ if(activePath)activePath.classList.remove("active"); activePath=p; if(p){p.classList.add("active");p.parentNode.appendChild(p);} }

function intro(){
  setActive(null);
  let cards=DATA.neighborhoods.map(n=>{
    const cnt=(venuesByHood[n.slug]||[]).length;
    return `<div class="hcard" data-slug="${n.slug}"><h3>${n.name}</h3><p>${n.take}</p><div class="count">${cnt} spots →</div></div>`;
  }).join("");
  document.getElementById('panel').innerHTML=
    `<div class="intro"><h1 class="serif">Pick a neighborhood.</h1>
     <p>ChiLocal isn't a list of everything — it's the handful of places worth your time, from people who actually live on these blocks. Three neighborhoods so far. We add more only when we know them.</p>
     <div class="hood-cards">${cards}</div></div>`;
  document.querySelectorAll('.hcard').forEach(c=>c.addEventListener('click',()=>{
    const slug=c.dataset.slug; const path=[...svg.querySelectorAll('path')].find(p=>p.dataset.key===bySlug[slug].geomKey);
    selectHood(slug,path);
  }));
}
let state={slug:null,cat:"all",gem:false};
function selectHood(slug,path){
  state={slug,cat:"all",gem:false};
  setActive(path);
  renderHood();
}
function renderHood(){
  const n=bySlug[state.slug]; const all=venuesByHood[state.slug]||[];
  const cats=[...new Set(all.map(v=>v.category))];
  let venues=all.filter(v=>(state.cat==="all"||v.category===state.cat)&&(!state.gem||v.hidden_gem));
  const chips=[`<button class="chip ${state.cat==='all'?'active':''}" data-cat="all">All</button>`]
    .concat(cats.map(c=>`<button class="chip ${state.cat===c?'active':''}" data-cat="${c}">${catName[c]||c}</button>`))
    .concat([`<button class="chip gem ${state.gem?'active':''}" data-gem="1">★ Hidden gems</button>`]).join("");
  const cards=venues.map(v=>`
    <article class="venue">
      <div class="v-head"><h3>${v.name}</h3>${v.hidden_gem?'<span class="badge">Hidden gem</span>':''}</div>
      <div class="v-meta">${catName[v.category]||v.category} · ${v.price}</div>
      <p class="take">${v.take}</p>
      <div class="fit good"><span class="lab">Best for</span><span>${v.best_for}</span></div>
      <div class="fit bad"><span class="lab">Skip if</span><span>${v.skip_if}</span></div>
    </article>`).join("") || `<p class="empty">Nothing matches that filter here yet.</p>`;
  document.getElementById('panel').innerHTML=
    `<button class="back">← All neighborhoods</button>
     <h2 style="margin:0;font-size:22px">${n.name}</h2>
     <p class="hood-take">${n.take}</p>
     <div class="filters">${chips}</div>${cards}`;
  document.querySelector('.back').addEventListener('click',intro);
  document.querySelectorAll('.chip[data-cat]').forEach(b=>b.addEventListener('click',()=>{state.cat=b.dataset.cat;renderHood();}));
  document.querySelectorAll('.chip[data-gem]').forEach(b=>b.addEventListener('click',()=>{state.gem=!state.gem;renderHood();}));
}
function showEmpty(nm,path){
  setActive(path);
  document.getElementById('panel').innerHTML=
    `<button class="back">← All neighborhoods</button>
     <h2 style="margin:0;font-size:22px">${nm}</h2>
     <p class="empty">${DATA.emptyState}</p>`;
  document.querySelector('.back').addEventListener('click',intro);
}
// search
const q=document.getElementById('q'),results=document.getElementById('results');
q.addEventListener('input',()=>{
  const v=q.value.toLowerCase().trim(); if(!v){results.hidden=true;return;}
  const hoods=DATA.neighborhoods.filter(n=>n.name.toLowerCase().includes(v)).map(n=>({t:n.name,s:"Neighborhood",act:()=>selectHood(n.slug,[...svg.querySelectorAll('path')].find(p=>p.dataset.key===n.geomKey))}));
  const vens=DATA.venues.filter(x=>x.name.toLowerCase().includes(v)).map(x=>({t:x.name,s:bySlug[x.neighborhood].name,act:()=>selectHood(x.neighborhood,[...svg.querySelectorAll('path')].find(p=>p.dataset.key===bySlug[x.neighborhood].geomKey))}));
  const all=hoods.concat(vens).slice(0,8);
  results.innerHTML=all.map((r,i)=>`<li data-i="${i}"><span>${r.t}</span><span class="r-sub">${r.s}</span></li>`).join("");
  results.hidden=all.length===0;
  results.querySelectorAll('li').forEach(li=>li.addEventListener('click',()=>{all[li.dataset.i].act();q.value="";results.hidden=true;}));
});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))results.hidden=true;});
intro();
</script></body></html>
