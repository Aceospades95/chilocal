const COLORS={"community-areas":"#41b6e6","neighborhoods":"#f2784b"};
const svg=document.getElementById('map'),hl=document.getElementById('hl');
let active="community-areas",selected=null;
// projection from community-areas extent
let minx=1e9,maxx=-1e9,miny=1e9,maxy=-1e9;
DATA["community-areas"].features.forEach(f=>f.geometry.coordinates.forEach(p=>p.forEach(r=>r.forEach(([x,y])=>{minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y)}))));
const k=Math.cos((miny+maxy)/2*Math.PI/180),W=1000,H=Math.round((maxy-miny)/((maxx-minx)*k)*W);
svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
const px=x=>(x-minx)*k/((maxx-minx)*k)*W, py=y=>H-(y-miny)/(maxy-miny)*H;
function dPath(geom){let d="";geom.coordinates.forEach(poly=>poly.forEach(ring=>{ring.forEach(([x,y],i)=>d+=(i?"L":"M")+px(x).toFixed(1)+" "+py(y).toFixed(1));d+="Z"}));return d}
function render(){
  svg.innerHTML="";selected=null;
  document.getElementById('ro-lab').textContent=active==="community-areas"?"Community Areas":"Neighborhoods";
  document.getElementById('ro-nm').textContent="Hover an area";document.getElementById('ro-sub').textContent="click to lock · search to find";
  const col=COLORS[active];
  DATA[active].features.forEach(f=>{
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",dPath(f.geometry));p.setAttribute("class","area");
    p.setAttribute("fill",col);p.setAttribute("fill-opacity",".18");p.dataset.name=f.properties.name;
    p.addEventListener("mousemove",e=>{hl.style.display="block";hl.style.left=e.clientX+"px";hl.style.top=e.clientY+"px";hl.textContent=f.properties.name});
    p.addEventListener("mouseenter",()=>{if(p!==selected){p.setAttribute("fill-opacity",".5")}document.getElementById('ro-nm').textContent=f.properties.name});
    p.addEventListener("mouseleave",()=>{hl.style.display="none";if(p!==selected)p.setAttribute("fill-opacity",".18")});
    p.addEventListener("click",()=>select(p));
    svg.appendChild(p);
  });
}
function select(p){
  if(selected){selected.setAttribute("stroke","#0b0d11");selected.setAttribute("stroke-width",".4");selected.setAttribute("fill-opacity",".18")}
  selected=p;p.setAttribute("stroke","#fff");p.setAttribute("stroke-width","1.4");p.setAttribute("fill-opacity",".55");p.parentNode.appendChild(p);
  document.getElementById('ro-nm').textContent=p.dataset.name;document.getElementById('ro-sub').textContent="selected";
}
document.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".seg button").forEach(x=>x.classList.remove("active"));b.classList.add("active");active=b.dataset.l;document.getElementById('q').value="";render();
}));
document.getElementById('q').addEventListener('input',e=>{
  const v=e.target.value.toLowerCase().trim();if(!v)return;
  const hit=[...svg.querySelectorAll('path')].find(p=>p.dataset.name.toLowerCase().includes(v));
  if(hit){select(hit);const bb=hit.getBBox();}
});
render();
