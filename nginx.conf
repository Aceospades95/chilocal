server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # GeoJSON isn't in nginx's default mime.types
    location ~* \.geojson$ {
        default_type application/geo+json;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Long-cache static assets
    location ~* \.(?:js|css|png|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # GeoJSON compresses ~10x — worth it
    gzip            on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      application/json application/geo+json application/javascript text/css image/svg+xml;
}
